services:
  flask-app:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_workflow_backend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${FLASK_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - FLASK_ENV=production
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      # PYTHONPATH helps python find the backend module
      - PYTHONPATH=/app
    # We map the backend folder directly to /app/backend inside container for module resolution
    volumes:
      - ./backend:/app/backend
